<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <script>
        (function() {
            const t=(localStorage.getItem("rc-theme")||"dark");
            document.documentElement.setAttribute("data-theme",t);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management - RentalCore</title>

    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#030712">

    <link rel="stylesheet" href="/static/css/rental-core-design.css?v={{.timestamp}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .inventory-card {
            background: var(--rc-surface);
            border: 1px solid var(--rc-border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.2s;
        }

        .inventory-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .inventory-card.low-stock {
            border-color: var(--rc-warning);
            background: linear-gradient(135deg, var(--rc-surface) 0%, rgba(var(--rc-warning-rgb), 0.1) 100%);
        }

        .stock-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .stock-badge.low {
            background: var(--rc-warning);
            color: var(--rc-text);
        }

        .stock-badge.ok {
            background: var(--rc-success);
            color: var(--rc-text);
        }

        .barcode-display {
            font-family: 'JetBrains Mono', monospace;
            background: var(--rc-background);
            padding: 0.5rem;
            border-radius: 4px;
            display: inline-block;
            font-size: 0.875rem;
        }
    </style>
</head>
<body>
    {{template "navbar" .}}

    <div class="rc-container" style="max-width: 1400px; margin-top: 2rem;">
        <div class="rc-page-header">
            <div>
                <h1 class="rc-page-title">
                    <i class="bi bi-boxes"></i>
                    Inventory Management
                </h1>
                <p class="rc-page-subtitle">Manage accessories and consumables stock levels</p>
            </div>
            <button class="rc-btn rc-btn-primary" onclick="showAdjustStockModal()">
                <i class="bi bi-plus-circle"></i>
                Adjust Stock
            </button>
        </div>

        <!-- Low Stock Alerts -->
        <div class="rc-card" style="margin-bottom: 2rem; border-left: 4px solid var(--rc-warning);">
            <div class="rc-card-header">
                <h3><i class="bi bi-exclamation-triangle"></i> Low Stock Alerts</h3>
            </div>
            <div class="rc-card-body">
                <div id="lowStockAlerts" class="inventory-grid">
                    <div class="rc-loading">Loading alerts...</div>
                </div>
            </div>
        </div>

        <!-- Accessories -->
        <div class="rc-card" style="margin-bottom: 2rem;">
            <div class="rc-card-header">
                <h3><i class="bi bi-plug"></i> Accessories</h3>
            </div>
            <div class="rc-card-body">
                <div id="accessoriesList" class="inventory-grid">
                    <div class="rc-loading">Loading accessories...</div>
                </div>
            </div>
        </div>

        <!-- Consumables -->
        <div class="rc-card">
            <div class="rc-card-header">
                <h3><i class="bi bi-droplet"></i> Consumables</h3>
            </div>
            <div class="rc-card-body">
                <div id="consumablesList" class="inventory-grid">
                    <div class="rc-loading">Loading consumables...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Adjust Stock Modal -->
    <div id="adjustStockModal" class="rc-modal">
        <div class="rc-modal-dialog">
            <div class="rc-modal-content">
                <div class="rc-modal-header">
                    <h3>Adjust Stock</h3>
                    <button class="rc-modal-close" onclick="closeAdjustStockModal()">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
                <div class="rc-modal-body">
                    <form id="adjustStockForm">
                        <div class="rc-form-group">
                            <label>Product</label>
                            <select id="adjustProductId" class="rc-form-control" required>
                                <option value="">Select product...</option>
                            </select>
                        </div>

                        <div class="rc-form-group">
                            <label>Adjustment (+/-)</label>
                            <input type="number" id="adjustQuantity" class="rc-form-control" step="0.001" required placeholder="e.g., +10 or -5">
                        </div>

                        <div class="rc-form-group">
                            <label>Reason</label>
                            <textarea id="adjustReason" class="rc-form-control" required placeholder="e.g., Received shipment, Damaged items removed"></textarea>
                        </div>
                    </form>
                </div>
                <div class="rc-modal-footer">
                    <button class="rc-btn rc-btn-secondary" onclick="closeAdjustStockModal()">Cancel</button>
                    <button class="rc-btn rc-btn-primary" onclick="submitAdjustStock()">
                        <i class="bi bi-check-circle"></i>
                        Adjust Stock
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Transaction History Modal -->
    <div id="transactionModal" class="rc-modal">
        <div class="rc-modal-dialog" style="max-width: 800px;">
            <div class="rc-modal-content">
                <div class="rc-modal-header">
                    <h3 id="transactionModalTitle">Transaction History</h3>
                    <button class="rc-modal-close" onclick="closeTransactionModal()">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>
                <div class="rc-modal-body">
                    <div id="transactionHistory"></div>
                </div>
                <div class="rc-modal-footer">
                    <button class="rc-btn rc-btn-secondary" onclick="closeTransactionModal()">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Load data on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadLowStockAlerts();
            loadAccessories();
            loadConsumables();
            loadProductsForDropdown();
        });

        // Load low stock alerts
        async function loadLowStockAlerts() {
            try {
                const response = await fetch('/api/inventory/low-stock');
                const data = await response.json();

                const container = document.getElementById('lowStockAlerts');
                if (data.alerts && data.alerts.length > 0) {
                    container.innerHTML = data.alerts.map(alert => `
                        <div class="inventory-card low-stock">
                            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem;">
                                <div>
                                    <h4 style="margin: 0;">${alert.name}</h4>
                                    <span class="barcode-display">${alert.generic_barcode || 'N/A'}</span>
                                </div>
                                <span class="stock-badge low">
                                    <i class="bi bi-exclamation-triangle"></i>
                                    Low Stock
                                </span>
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <div>
                                    <div style="color: var(--rc-text-muted); font-size: 0.875rem;">Current</div>
                                    <div style="font-size: 1.5rem; font-weight: 700;">${alert.stock_quantity} ${alert.count_type_abbr}</div>
                                </div>
                                <div>
                                    <div style="color: var(--rc-text-muted); font-size: 0.875rem;">Minimum</div>
                                    <div style="font-size: 1.5rem; font-weight: 700;">${alert.min_stock_level} ${alert.count_type_abbr}</div>
                                </div>
                            </div>
                            <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--rc-border);">
                                <button class="rc-btn rc-btn-sm rc-btn-warning" onclick="showTransactionHistory(${alert.productID}, '${alert.name}')">
                                    <i class="bi bi-clock-history"></i>
                                    History
                                </button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--rc-text-muted);"><i class="bi bi-check-circle" style="font-size: 3rem;"></i><p>All stock levels are adequate</p></div>';
                }
            } catch (error) {
                console.error('Error loading low stock alerts:', error);
                document.getElementById('lowStockAlerts').innerHTML = '<div class="rc-alert rc-alert-danger">Failed to load alerts</div>';
            }
        }

        // Load accessories
        async function loadAccessories() {
            try {
                const response = await fetch('/api/accessories/products');
                const data = await response.json();

                const container = document.getElementById('accessoriesList');
                if (data.products && data.products.length > 0) {
                    container.innerHTML = data.products.map(product => renderInventoryCard(product)).join('');
                } else {
                    container.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--rc-text-muted);">No accessories found</div>';
                }
            } catch (error) {
                console.error('Error loading accessories:', error);
                document.getElementById('accessoriesList').innerHTML = '<div class="rc-alert rc-alert-danger">Failed to load accessories</div>';
            }
        }

        // Load consumables
        async function loadConsumables() {
            try {
                const response = await fetch('/api/consumables/products');
                const data = await response.json();

                const container = document.getElementById('consumablesList');
                if (data.products && data.products.length > 0) {
                    container.innerHTML = data.products.map(product => renderInventoryCard(product)).join('');
                } else {
                    container.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--rc-text-muted);">No consumables found</div>';
                }
            } catch (error) {
                console.error('Error loading consumables:', error);
                document.getElementById('consumablesList').innerHTML = '<div class="rc-alert rc-alert-danger">Failed to load consumables</div>';
            }
        }

        // Render inventory card
        function renderInventoryCard(product) {
            const isLowStock = product.stock_quantity <= (product.min_stock_level || 0);
            const stockBadge = isLowStock ?
                '<span class="stock-badge low"><i class="bi bi-exclamation-triangle"></i> Low Stock</span>' :
                '<span class="stock-badge ok"><i class="bi bi-check-circle"></i> OK</span>';

            return `
                <div class="inventory-card ${isLowStock ? 'low-stock' : ''}">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 1rem;">
                        <div>
                            <h4 style="margin: 0;">${product.name}</h4>
                            <span class="barcode-display">${product.generic_barcode || 'N/A'}</span>
                        </div>
                        ${stockBadge}
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                        <div>
                            <div style="color: var(--rc-text-muted); font-size: 0.875rem;">Stock</div>
                            <div style="font-size: 1.5rem; font-weight: 700;">${product.stock_quantity || 0} ${product.count_type?.abbreviation || ''}</div>
                        </div>
                        <div>
                            <div style="color: var(--rc-text-muted); font-size: 0.875rem;">Price/Unit</div>
                            <div style="font-size: 1.5rem; font-weight: 700;">€${(product.price_per_unit || 0).toFixed(2)}</div>
                        </div>
                    </div>
                    <div style="padding-top: 1rem; border-top: 1px solid var(--rc-border); display: flex; gap: 0.5rem;">
                        <button class="rc-btn rc-btn-sm rc-btn-secondary" onclick="showTransactionHistory(${product.productID}, '${product.name}')">
                            <i class="bi bi-clock-history"></i>
                            History
                        </button>
                    </div>
                </div>
            `;
        }

        // Load products for dropdown
        async function loadProductsForDropdown() {
            try {
                const [accessories, consumables] = await Promise.all([
                    fetch('/api/accessories/products').then(r => r.json()),
                    fetch('/api/consumables/products').then(r => r.json())
                ]);

                const select = document.getElementById('adjustProductId');
                let options = '<option value="">Select product...</option>';

                if (accessories.products && accessories.products.length > 0) {
                    options += '<optgroup label="Accessories">';
                    accessories.products.forEach(p => {
                        options += `<option value="${p.productID}">${p.name} (${p.count_type?.abbreviation || ''})</option>`;
                    });
                    options += '</optgroup>';
                }

                if (consumables.products && consumables.products.length > 0) {
                    options += '<optgroup label="Consumables">';
                    consumables.products.forEach(p => {
                        options += `<option value="${p.productID}">${p.name} (${p.count_type?.abbreviation || ''})</option>`;
                    });
                    options += '</optgroup>';
                }

                select.innerHTML = options;
            } catch (error) {
                console.error('Error loading products:', error);
            }
        }

        // Show adjust stock modal
        function showAdjustStockModal() {
            document.getElementById('adjustStockModal').classList.add('active');
            document.getElementById('adjustStockForm').reset();
        }

        // Close adjust stock modal
        function closeAdjustStockModal() {
            document.getElementById('adjustStockModal').classList.remove('active');
        }

        // Submit adjust stock
        async function submitAdjustStock() {
            const productId = document.getElementById('adjustProductId').value;
            const quantity = parseFloat(document.getElementById('adjustQuantity').value);
            const reason = document.getElementById('adjustReason').value;

            if (!productId || isNaN(quantity) || !reason) {
                alert('Please fill in all fields');
                return;
            }

            try {
                const response = await fetch('/api/inventory/adjust', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        product_id: parseInt(productId),
                        quantity: quantity,
                        reason: reason
                    })
                });

                if (response.ok) {
                    alert('Stock adjusted successfully');
                    closeAdjustStockModal();
                    // Reload data
                    loadLowStockAlerts();
                    loadAccessories();
                    loadConsumables();
                } else {
                    const error = await response.json();
                    alert('Error: ' + (error.error || 'Failed to adjust stock'));
                }
            } catch (error) {
                console.error('Error adjusting stock:', error);
                alert('Failed to adjust stock');
            }
        }

        // Show transaction history
        async function showTransactionHistory(productId, productName) {
            document.getElementById('transactionModalTitle').textContent = `Transaction History - ${productName}`;
            document.getElementById('transactionModal').classList.add('active');
            document.getElementById('transactionHistory').innerHTML = '<div class="rc-loading">Loading...</div>';

            try {
                const response = await fetch(`/api/inventory/transactions?product_id=${productId}&limit=50`);
                const data = await response.json();

                if (data.transactions && data.transactions.length > 0) {
                    const html = `
                        <table class="rc-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Type</th>
                                    <th>Quantity</th>
                                    <th>Reference</th>
                                    <th>Notes</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.transactions.map(t => `
                                    <tr>
                                        <td>${new Date(t.created_at).toLocaleString()}</td>
                                        <td><span class="rc-badge rc-badge-${t.transaction_type === 'in' ? 'success' : t.transaction_type === 'out' ? 'warning' : 'info'}">${t.transaction_type}</span></td>
                                        <td style="font-family: 'JetBrains Mono', monospace;">${t.quantity > 0 ? '+' : ''}${t.quantity}</td>
                                        <td>${t.reference_type || '-'} ${t.reference_id || ''}</td>
                                        <td>${t.notes || '-'}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                    document.getElementById('transactionHistory').innerHTML = html;
                } else {
                    document.getElementById('transactionHistory').innerHTML = '<p style="text-align: center; color: var(--rc-text-muted);">No transactions found</p>';
                }
            } catch (error) {
                console.error('Error loading transactions:', error);
                document.getElementById('transactionHistory').innerHTML = '<div class="rc-alert rc-alert-danger">Failed to load transactions</div>';
            }
        }

        // Close transaction modal
        function closeTransactionModal() {
            document.getElementById('transactionModal').classList.remove('active');
        }
    </script>
</body>
</html>
