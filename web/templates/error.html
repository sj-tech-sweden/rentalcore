<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <script>
        (function() {
            const t = (localStorage.getItem("rc-theme") || "dark");
            document.documentElement.setAttribute("data-theme", t);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - RentalCore</title>
    <link rel="stylesheet" href="/static/css/rental-core-design.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
        <div style="max-width:560px;width:100%;">
            <div class="rc-card">
                <div class="rc-card-header" style="background:var(--color-danger,#dc2626);color:#fff;">
                    <h5 style="margin:0;"><i class="bi bi-exclamation-triangle"></i> Error</h5>
                </div>
                <div class="rc-card-body">
                    <div class="rc-alert" style="background:rgba(220,38,38,0.1);border:1px solid rgba(220,38,38,0.3);border-radius:0.5rem;padding:1rem;margin-bottom:1rem;">
                        <strong>Something went wrong:</strong>
                        <p style="margin:0.5rem 0 0;">{{.error}}</p>
                    </div>
                    <div style="display:flex;gap:1rem;justify-content:space-between;">
                        <button onclick="history.back()" class="rc-btn rc-btn-ghost">
                            <i class="bi bi-arrow-left"></i> Go Back
                        </button>
                        <a href="/" class="rc-btn rc-btn-primary">
                            <i class="bi bi-house"></i> Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
