        $ref: '#/definitions/go-barcode-webapp_internal_models.Device'
      device_id:
        type: string
      job_package:
        allOf:
        - $ref: '#/definitions/go-barcode-webapp_internal_models.JobPackage'
        description: Relationships
      job_package_id:
        type: integer
      quantity:
        type: integer
      released_at:
