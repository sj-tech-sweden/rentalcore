      is_consumable:
        type: boolean
      itemcostperday:
        type: number
      maintenanceInterval:
        type: integer
      manufacturer:
        $ref: '#/definitions/go-barcode-webapp_internal_models.Manufacturer'
      manufacturerID:
        type: integer
      min_stock_level:
        type: number
      name:
        type: string
      pos_in_category:
        type: integer
      powerconsumption:
        type: number
      price_per_unit:
        type: number
      productID:
        type: integer
      stock_quantity:
        type: number
      subbiercategory:
        $ref: '#/definitions/go-barcode-webapp_internal_models.Subbiercategory'
      subbiercategoryID:
        type: string
      subcategory:
        $ref: '#/definitions/go-barcode-webapp_internal_models.Subcategory'
      subcategoryID:
        type: string
      weight:
        type: number
      width:
        type: number
    type: object
  go-barcode-webapp_internal_models.ProductPackage:
    properties:
      created_at:
        type: string
      description:
        $ref: '#/definitions/sql.NullString'
      name:
        type: string
      package_code:
        type: string
      package_id:
        type: integer
      price:
        $ref: '#/definitions/sql.NullFloat64'
      product_id:
        description: Links to products table
        type: integer
      updated_at:
        type: string
    type: object
  go-barcode-webapp_internal_models.Status:
    properties:
      jobs:
        items:
          $ref: '#/definitions/go-barcode-webapp_internal_models.Job'
        type: array
      status:
        type: string
      statusID:
        type: integer
    type: object
  go-barcode-webapp_internal_models.Subbiercategory:
    properties:
      abbreviation:
        type: string
