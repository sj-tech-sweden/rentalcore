        description: Links to products table
        type: integer
      updated_at:
        type: string
    type: object
  go-barcode-webapp_internal_models.Status:
    properties:
      jobs:
        items:
          $ref: '#/definitions/go-barcode-webapp_internal_models.Job'
        type: array
      status:
        type: string
      statusID:
        type: integer
    type: object
  go-barcode-webapp_internal_models.Subbiercategory:
    properties:
      abbreviation:
        type: string
      name:
        type: string
      subbiercategoryID:
        type: string
      subcategory:
        $ref: '#/definitions/go-barcode-webapp_internal_models.Subcategory'
