      job_code:
        type: string
      job_devices:
        items:
          $ref: '#/definitions/go-barcode-webapp_internal_models.JobDevice'
        type: array
      job_packages:
        items:
          $ref: '#/definitions/go-barcode-webapp_internal_models.JobPackage'
