        $ref: '#/definitions/go-barcode-webapp_internal_models.Category'
      categoryID:
        type: integer
      name:
        type: string
      subcategoryID:
        type: string
    type: object
  go-barcode-webapp_internal_models.User:
    properties:
      createdAt:
        type: string
      email:
        type: string
      firstName:
        type: string
      forcePasswordChange:
        type: boolean
      isActive:
        type: boolean
      lastLogin:
        type: string
      lastName:
        type: string
      updatedAt:
        type: string
      userID:
        type: integer
      username:
        type: string
    type: object
  internal_handlers.currencyRequest:
    properties:
      currencySymbol:
        type: string
    required:
    - currencySymbol
    type: object
  internal_handlers.currencyResponse:
    properties:
      currencySymbol:
        type: string
      success:
        type: boolean
    type: object
  internal_handlers.errorResponse:
    properties:
      error:
        type: string
    type: object
  sql.NullFloat64:
    properties:
      float64:
        type: number
      valid:
        description: Valid is true if Float64 is not NULL
        type: boolean
    type: object
  sql.NullString:
    properties:
      string:
        type: string
      valid:
        description: Valid is true if String is not NULL
        type: boolean
    type: object
  sql.NullTime:
    properties:
      time:
        type: string
      valid:
        description: Valid is true if Time is not NULL
        type: boolean
    type: object
info:
  contact:
    name: SJ Tech Sweden
    url: https://github.com/sj-tech-sweden/rentalcore
  description: RentalCore is a rental management system API for managing jobs, customers,
    devices, products, and more.
  license:
    name: MIT
  termsOfService: http://swagger.io/terms/
  title: RentalCore API
  version: "1.0"
paths:
  /admin/currency:
    get:
      description: Returns the application currency symbol stored in app_settings.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.currencyResponse'
      security:
      - SessionCookie: []
      summary: Get currency symbol
      tags:
      - admin
    put:
      consumes:
      - application/json
      description: Updates the application currency symbol. Must be non-empty and
        at most 8 characters.
      parameters:
      - description: Currency payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/internal_handlers.currencyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handlers.currencyResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handlers.errorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handlers.errorResponse'
      security:
      - SessionCookie: []
      summary: Update currency symbol
      tags:
      - admin
  /customers:
    get:
      description: Returns a paginated list of customers
      parameters:
      - description: Search term
        in: query
        name: search
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of customers
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - SessionCookie: []
      summary: List customers
      tags:
      - customers
    post:
      consumes:
      - application/json
      description: Creates a new customer
      parameters:
      - description: Customer data
        in: body
        name: customer
        required: true
        schema:
          $ref: '#/definitions/go-barcode-webapp_internal_models.Customer'
      produces:
      - application/json
      responses:
        "201":
          description: Created customer
          schema:
            $ref: '#/definitions/go-barcode-webapp_internal_models.Customer'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - SessionCookie: []
      summary: Create a customer
      tags:
      - customers
  /customers/{id}:
    delete:
      description: Deletes a customer by ID
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Success message
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid ID
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - SessionCookie: []
      summary: Delete a customer
      tags:
      - customers
    get:
      description: Returns details of a specific customer by ID
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Customer details
          schema:
            $ref: '#/definitions/go-barcode-webapp_internal_models.Customer'
        "400":
          description: Invalid ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Customer not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - SessionCookie: []
      summary: Get a customer
      tags:
      - customers
    put:
      consumes:
      - application/json
      description: Updates an existing customer
      parameters:
      - description: Customer ID
        in: path
        name: id
        required: true
        type: integer
      - description: Customer update data
        in: body
        name: customer
        required: true
        schema:
          $ref: '#/definitions/go-barcode-webapp_internal_models.Customer'
      produces:
      - application/json
      responses:
        "200":
          description: Updated customer
          schema:
            $ref: '#/definitions/go-barcode-webapp_internal_models.Customer'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - SessionCookie: []
      summary: Update a customer
      tags:
      - customers
  /devices:
    get:
      description: Returns a paginated list of devices
      parameters:
      - description: Search term
        in: query
        name: search
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of devices
          schema:
            items:
              $ref: '#/definitions/go-barcode-webapp_internal_models.Device'
            type: array
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - SessionCookie: []
      summary: List devices
      tags:
      - devices
  /devices/{id}:
    get:
      description: Returns details of a specific device by ID or serial number
      parameters:
      - description: Device ID or serial number
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Device details
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Device not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - SessionCookie: []
      summary: Get a device
      tags:
      - devices
  /financial/stats:
    get:
      description: Returns aggregated financial statistics
      produces:
      - application/json
      responses:
        "200":
          description: Financial statistics
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - SessionCookie: []
      summary: Get financial statistics
      tags:
      - financial
  /financial/transactions:
    get:
      description: Returns a paginated list of financial transactions
      parameters:
      - description: Filter by transaction type
        in: query
        name: type
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Filter by customer ID
        in: query
        name: customerid
        type: integer
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size (max 100)
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Paginated transactions
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - SessionCookie: []
      summary: List financial transactions
      tags:
      - financial
  /jobs:
    get:
      description: Returns a paginated list of jobs
      parameters:
      - description: Search term
        in: query
        name: search
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of jobs
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - SessionCookie: []
      summary: List jobs
      tags:
      - jobs
    post:
      consumes:
      - application/json
      description: Creates a new job with the provided data
      parameters:
      - description: Job data
        in: body
        name: job
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created job
          schema:
            $ref: '#/definitions/go-barcode-webapp_internal_models.Job'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - SessionCookie: []
      summary: Create a job
      tags:
      - jobs
  /jobs/{id}:
    delete:
      description: Deletes a job by ID
      parameters:
      - description: Job ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Success message
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid ID
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - SessionCookie: []
      summary: Delete a job
      tags:
      - jobs
    get:
      description: Returns details of a specific job by ID
      parameters:
      - description: Job ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Job details
          schema:
            $ref: '#/definitions/go-barcode-webapp_internal_models.Job'
        "400":
          description: Invalid ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Job not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - SessionCookie: []
      summary: Get a job
      tags:
      - jobs
    put:
      consumes:
      - application/json
      description: Updates an existing job with the provided data
      parameters:
      - description: Job ID
        in: path
        name: id
        required: true
        type: integer
      - description: Job update data
        in: body
        name: job
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Updated job
          schema:
            $ref: '#/definitions/go-barcode-webapp_internal_models.Job'
        "400":
          description: Invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Job not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - SessionCookie: []
      summary: Update a job
      tags:
      - jobs
  /jobs/{id}/product-requirements:
    get:
      description: Returns the list of product quantity requirements for a job. These
        are the products requested for the job; specific devices are assigned later
        in warehousecore.
      parameters:
      - description: Job ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Product requirements
          schema:
            items:
              $ref: '#/definitions/go-barcode-webapp_internal_models.JobProductRequirement'
            type: array
        "400":
