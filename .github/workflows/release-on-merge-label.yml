name: Release On Labeled Merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  packages: write
  pull-requests: read

concurrency:
  group: release-${{ github.event.repository.name }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
      MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}

    steps:
      - name: Resolve release bump from PR labels
        id: bump
        env:
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ' ') }}
        run: |
          bump=""

          if [[ "$LABELS" == *"major"* ]]; then
            bump="major"
          elif [[ "$LABELS" == *"minor"* ]]; then
            bump="minor"
          elif [[ "$LABELS" == *"patch"* ]]; then
            bump="patch"
          fi

          if [[ -z "$bump" ]]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No release label found (patch/minor/major)."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "bump=$bump" >> "$GITHUB_OUTPUT"
            echo "Release bump selected: $bump"
          fi

      - name: Stop when no version label is present
        if: steps.bump.outputs.should_release != 'true'
        run: echo "Skipping release because no patch/minor/major label was present."

      - name: Check out merged commit
        if: steps.bump.outputs.should_release == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.MERGE_SHA }}

      - name: Configure git identity
        if: steps.bump.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compute next semantic version
        if: steps.bump.outputs.should_release == 'true'
        id: version
        run: |
          latest_tag=$(git tag -l 'v*' --sort=-version:refname | head -n 1)
          if [[ -z "$latest_tag" ]]; then
            latest_tag="v0.0.0"
          fi

          version_core="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "$version_core"

          case "${{ steps.bump.outputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unsupported bump type: ${{ steps.bump.outputs.bump }}"
              exit 1
              ;;
          esac

          new_version="${major}.${minor}.${patch}"
          new_tag="v${new_version}"

          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "Next tag: $new_tag"

      - name: Create and push git tag
        if: steps.bump.outputs.should_release == 'true'
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.new_tag }}" >/dev/null 2>&1; then
            echo "Tag already exists: ${{ steps.version.outputs.new_tag }}"
            exit 1
          fi

          git tag -a "${{ steps.version.outputs.new_tag }}" "$MERGE_SHA" -m "Release ${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"

      # release will be created after the image is built and metadata uploaded

      - name: Log in to GHCR
        if: steps.bump.outputs.should_release == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.bump.outputs.should_release == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        if: steps.bump.outputs.should_release == 'true'
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.new_version }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ env.MERGE_SHA }}
            org.opencontainers.image.version=${{ steps.version.outputs.new_version }}
            org.opencontainers.image.title=${{ github.event.repository.name }}

      - name: Make GHCR package public (best-effort)
        if: steps.bump.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          pkg=${{ github.event.repository.name }}
          owner=${{ github.repository_owner }}
          token=${{ secrets.GITHUB_TOKEN }}

          # Try org packages API
          org_url="https://api.github.com/orgs/${owner}/packages/container/${pkg}/visibility"
          users_url="https://api.github.com/users/${owner}/packages/container/${pkg}/visibility"

          echo "Attempting to set package visibility to public (org endpoint)"
          resp=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH -H "Authorization: Bearer ${token}" -H "Accept: application/vnd.github+json" ${org_url} -d '{"visibility":"public"}' || true)
          if [ "$resp" = "200" ] || [ "$resp" = "201" ] || [ "$resp" = "204" ]; then
            echo "Package visibility set via org endpoint (HTTP $resp)"
          else
            echo "Org endpoint returned HTTP $resp, trying users endpoint"
            resp2=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH -H "Authorization: Bearer ${token}" -H "Accept: application/vnd.github+json" ${users_url} -d '{"visibility":"public"}' || true)
            echo "Users endpoint returned HTTP $resp2"
          fi

      - name: Create GitHub release (generate notes via API)
        if: steps.bump.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          REPO="${{ github.repository }}"
          TAG="${{ steps.version.outputs.new_tag }}"
          BODY="Release ${TAG} created from PR #${{ github.event.pull_request.number }}"
          PAYLOAD=$(jq -n --arg tag "$TAG" --arg target "$MERGE_SHA" --arg name "$TAG" --arg body "$BODY" '{tag_name:$tag, target_commitish:$target, name:$name, body:$body, draft:false, prerelease:false, generate_release_notes:true}')
          resp=$(curl -s -o /tmp/release_resp -w "%{http_code}" -X POST -H "Authorization: token ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" -d "$PAYLOAD" "https://api.github.com/repos/${REPO}/releases")
          if [ "$resp" = "201" ]; then
            echo "Release created via API"
            cat /tmp/release_resp
          else
            echo "Failed to create release (HTTP $resp)"
            cat /tmp/release_resp
            exit 1
          fi

      - name: Add image info to release (upload small metadata asset)
        if: steps.bump.outputs.should_release == 'true'
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag=${{ steps.version.outputs.new_version }}
          echo "image:${IMAGE_NAME}:${tag}" > image-info.txt
          echo "latest:${IMAGE_NAME}:latest" >> image-info.txt
          echo "digest:${{ steps.build.outputs.digest }}" >> image-info.txt
          echo "Uploading image-info.txt to release ${{ steps.version.outputs.new_tag }}"
          gh release upload "${{ steps.version.outputs.new_tag }}" image-info.txt --clobber
