name: CI

# Opt into Node.js 24 for JavaScript-based actions (avoid Node 20 deprecation)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches:


jobs:
  test:

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
    runs-on: ubuntu-latest
    env:
      # Opt into Node.js 24 for JavaScript-based actions to avoid Node 20 deprecation warnings
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify formatting
        run: test -z "$(gofmt -l .)"

      - name: Run Go tests
        run: go test -v ./...
